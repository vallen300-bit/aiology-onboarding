<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheAilogy — AI Playbook</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236C5CE7'/%3E%3Cstop offset='100%25' stop-color='%2300B4D8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23g)'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='48' font-weight='700' fill='white' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E">
<style>
:root {
  --bg-dark: #0f1117;
  --bg-sidebar: #161822;
  --bg-card: #1c1e2e;
  --bg-card-hover: #232538;
  --bg-input: #252738;
  --border: #2a2d3e;
  --border-light: #353849;
  --text-primary: #e8eaf0;
  --text-secondary: #9ba1b5;
  --text-muted: #6b7186;
  --accent: #6C5CE7;
  --accent-light: #a29bfe;
  --accent-bg: rgba(108,92,231,0.12);
  --accent-border: rgba(108,92,231,0.3);
  --cyan: #00B4D8;
  --cyan-bg: rgba(0,180,216,0.12);
  --green: #00C9A7;
  --green-bg: rgba(0,201,167,0.12);
  --amber: #F0B429;
  --amber-bg: rgba(240,180,41,0.12);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.12);
  --rose: #F472B6;
  --rose-bg: rgba(244,114,182,0.12);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* ===== LAYOUT ===== */
.app { display: flex; height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 18px;
  color: white;
}

.logo-text {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo-text span { color: var(--accent-light); }

.sidebar-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

/* Level Selector */
.level-selector {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.level-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}

.level-buttons {
  display: flex;
  gap: 6px;
}

.level-btn {
  flex: 1;
  padding: 7px 0;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
}

.level-btn:hover { border-color: var(--accent-border); color: var(--text-primary); }
.level-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-light); }

/* Domain Navigation */
.nav-section {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.nav-section::-webkit-scrollbar { width: 4px; }
.nav-section::-webkit-scrollbar-track { background: transparent; }
.nav-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.nav-group-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 16px 20px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  transition: var(--transition);
  border-left: 3px solid transparent;
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,0.03); }
.nav-item.active {
  background: var(--accent-bg);
  border-left-color: var(--accent);
}

.nav-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.nav-item-text {
  flex: 1;
  min-width: 0;
}

.nav-item-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-item-rhythm {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

.nav-item.active .nav-item-name { color: var(--accent-light); }

.nav-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--border);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Foundation Section (Memory — bhavanga) */
.foundation-section {
  padding: 8px 0 4px;
  border-top: 1px solid var(--border);
}

.foundation-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 8px 20px 6px;
  opacity: 0.6;
}

.foundation-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  cursor: pointer;
  transition: var(--transition);
  border-left: 3px solid transparent;
}

.foundation-item:hover { background: rgba(255,255,255,0.03); }
.foundation-item.active {
  background: rgba(108,92,231,0.06);
  border-left-color: var(--accent);
}

.foundation-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  background: rgba(108,92,231,0.08);
}

.foundation-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}

.foundation-item.active .foundation-name { color: var(--accent-light); }

.foundation-sub {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 1px;
}

/* Memory Page Styles */
.memory-arch {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.memory-layer {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: var(--transition);
}

.memory-layer:hover {
  border-color: var(--accent-border);
}

.memory-layer-icon {
  font-size: 24px;
  margin-bottom: 8px;
}

.memory-layer-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.memory-layer-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.memory-layer-file {
  font-size: 11px;
  color: var(--accent-light);
  font-family: 'SF Mono', Consolas, monospace;
  margin-top: 8px;
  padding: 4px 8px;
  background: var(--accent-bg);
  border-radius: 4px;
  display: inline-block;
}

.memory-flow {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  overflow-x: auto;
}

.memory-flow-step {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.memory-flow-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  padding: 4px 10px;
  background: var(--accent-bg);
  border-radius: 6px;
}

.memory-flow-arrow {
  color: var(--text-muted);
  font-size: 14px;
}

/* Current Tasks List */
.tasks-list {
  margin-bottom: 32px;
}

.task-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  transition: var(--transition);
}

.task-row:hover {
  border-color: var(--border-light);
  background: var(--bg-card-hover);
}

.task-priority {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 2px;
}

.task-priority.high {
  background: var(--red-bg);
  color: var(--red);
}

.task-priority.medium {
  background: var(--amber-bg);
  color: var(--amber);
}

.task-priority.low {
  background: rgba(107,113,134,0.15);
  color: var(--text-muted);
}

.task-content {
  flex: 1;
  min-width: 0;
}

.task-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
}

.task-meta {
  display: flex;
  gap: 12px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.task-meta-item {
  font-size: 11px;
  color: var(--text-muted);
}

.task-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 20px;
  margin-top: 2px;
}

.task-file-note {
  font-size: 11px;
  color: var(--text-muted);
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  margin-top: 8px;
  text-align: center;
}

.task-file-note code {
  color: var(--accent-light);
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 11px;
}

/* Sense Doors Page */
.sense-doors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.source-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.source-card:hover {
  border-color: var(--border-light);
  background: var(--bg-card-hover);
}

.source-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.source-card-icon {
  width: 42px;
  height: 42px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.source-card-info {
  flex: 1;
  min-width: 0;
}

.source-card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.source-card-type {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

.source-card-status {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.source-card-status.connected {
  background: var(--green-bg);
  color: var(--green);
}

.source-card-status.local {
  background: var(--cyan-bg);
  color: var(--cyan);
}

.source-card-status.planned {
  background: rgba(107,113,134,0.15);
  color: var(--text-muted);
}

.source-card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.sense-doors-summary {
  display: flex;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.sense-summary-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

.sense-summary-num {
  font-size: 18px;
  font-weight: 800;
}

/* Control Panel Page */
.command-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.command-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
}

.command-card:hover {
  border-color: var(--accent-border);
  background: var(--bg-card-hover);
}

.command-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.command-card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 10px;
}

.command-card-name span {
  font-size: 18px;
}

.command-card-status {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.command-card-status.active {
  background: var(--green-bg);
  color: var(--green);
}

.command-card-status.coming {
  background: rgba(107,113,134,0.15);
  color: var(--text-muted);
}

.command-card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 14px;
}

.command-card-prompt {
  font-family: 'SF Mono', Consolas, monospace;
  font-size: 12px;
  color: var(--accent-light);
  background: var(--bg-dark);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.command-card-prompt code {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.command-copy-btn {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--accent-bg);
  color: var(--accent-light);
  border: 1px solid var(--accent-border);
  cursor: pointer;
  flex-shrink: 0;
  transition: var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.command-copy-btn:hover {
  background: var(--accent);
  color: white;
}

.command-card-meta {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.command-meta-tag {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Sidebar Footer */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
}

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 64px;
}

.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

/* Domain Header */
.domain-header {
  margin-bottom: 32px;
}

.domain-title-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
}

.domain-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.domain-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.domain-description {
  font-size: 15px;
  color: var(--text-secondary);
  max-width: 640px;
  line-height: 1.7;
}

.domain-meta {
  display: flex;
  gap: 16px;
  margin-top: 16px;
}

.meta-tag {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.meta-tag .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* ===== PLAYS GRID ===== */
.plays-section {
  margin-top: 32px;
}

.plays-section-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.plays-section-title .count {
  background: var(--bg-input);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}

.plays-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* Play Card */
.play-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.play-card:hover {
  border-color: var(--border-light);
  background: var(--bg-card-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.play-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}

.play-card-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  padding: 3px 8px;
  background: var(--bg-input);
  border-radius: 6px;
}

.play-card-level {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.play-card-level.beginner { background: var(--green-bg); color: var(--green); }
.play-card-level.intermediate { background: var(--amber-bg); color: var(--amber); }
.play-card-level.advanced { background: var(--accent-bg); color: var(--accent-light); }

.play-card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.4;
}

.play-card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 16px;
}

.play-card-tools {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tool-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 6px;
  background: var(--bg-input);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

/* Play Detail (Expanded) */
.play-detail {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.play-card.expanded .play-detail { display: block; }
.play-card.expanded { border-color: var(--accent-border); }

.play-step {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}

.play-step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--accent-bg);
  color: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}

.play-step-text {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.play-step-text strong { color: var(--text-primary); }

.prompt-box {
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin: 10px 0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  color: var(--cyan);
  line-height: 1.7;
  white-space: pre-wrap;
  position: relative;
}

.prompt-box .copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);

// ===== STATE =====
const STORAGE_KEY = 'theailogy-v1';

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return { level: 'intermediate', activeDomain: 'overview', expandedPlays: {} };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();

function setLevel(level) {
  state.level = level;
  state.expandedPlays = {};
  saveState();
  renderAll();
}

function setDomain(domainId) {
  state.activeDomain = domainId;
  state.expandedPlays = {};
  saveState();
  renderAll();
  document.getElementById('mainContent').scrollTop = 0;
}

function togglePlay(playId) {
  state.expandedPlays[playId] = !state.expandedPlays[playId];
  saveState();
  renderMain();
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  });
}

    btn.classList.toggle('active', btn.dataset.level === state.level);
  });

  for (const [groupId, groupLabel] of Object.entries(groups)) {
    const items = DOMAINS.filter(d => d.group === groupId);
    if (items.length === 0) continue;
    html += `<div class="nav-group-label">${groupLabel}</div>`;
    items.forEach(d => {
      const isActive = d.id === state.activeDomain;
      html += `
        <div class="nav-item ${isActive ? 'active' : ''}" onclick="setDomain('${d.id}')">
          <div class="nav-icon" style="background:${d.colorBg}">${d.icon}</div>
          <div class="nav-item-text">
            <div class="nav-item-name">${d.name}</div>
            ${d.rhythm ? `<div class="nav-item-rhythm">${d.rhythm}</div>` : ''}
          </div>
          ${d.comingSoon ? '<span class="nav-badge">Soon</span>' : ''}
        </div>`;
    });
  }
  nav.innerHTML = html;

  // Foundation section (bhavanga + dvāra + manasikāra)
  const isMemoryActive = state.activeDomain === 'memory';
  const isSenseActive = state.activeDomain === 'sensedoors';
  const isControlActive = state.activeDomain === 'controlpanel';
  const connectedCount = SENSE_DOORS.sources.filter(s => s.status !== 'planned').length;
  const activeCommands = CONTROL_PANEL.commands.filter(c => c.status === 'active').length;
  foundation.innerHTML = `
    <div class="foundation-label">Foundation</div>
    <div class="foundation-item ${isMemoryActive ? 'active' : ''}" onclick="setDomain('memory')">
      <div class="foundation-icon">${FOUNDATION.icon}</div>
      <div>
        <div class="foundation-name">${FOUNDATION.name}</div>
        <div class="foundation-sub">${FOUNDATION.subtitle}</div>
      </div>
    </div>
    <div class="foundation-item ${isSenseActive ? 'active' : ''}" onclick="setDomain('sensedoors')">
      <div class="foundation-icon">${SENSE_DOORS.icon}</div>
      <div>
        <div class="foundation-name">${SENSE_DOORS.name}</div>
        <div class="foundation-sub">${connectedCount} connected</div>
      </div>
    </div>
    <div class="foundation-item ${isControlActive ? 'active' : ''}" onclick="setDomain('controlpanel')">
      <div class="foundation-icon">${CONTROL_PANEL.icon}</div>
      <div>
        <div class="foundation-name">${CONTROL_PANEL.name}</div>
        <div class="foundation-sub">${activeCommands} commands</div>
      </div>
    </div>`;
}

function renderMain() {
  const main = document.getElementById('mainContent');

  // Memory foundation page
  if (state.activeDomain === 'memory') {
    renderMemory(main);
    return;
  }

  // Sense Doors page
  if (state.activeDomain === 'sensedoors') {
    renderSenseDoors(main);
    return;
  }

  // Control Panel page
  if (state.activeDomain === 'controlpanel') {
    renderControlPanel(main);
    return;
  }

  const domain = DOMAINS.find(d => d.id === state.activeDomain);
  if (!domain) return;

  if (domain.id === 'overview') {
    renderOverview(main);
    return;
  }

  if (domain.comingSoon) {
    main.innerHTML = `
      <div class="domain-header">
        <div class="domain-title-row">
          <div class="domain-icon" style="background:${domain.colorBg}">${domain.icon}</div>
          <div class="domain-title">${domain.name}</div>
        </div>
        <div class="domain-description">${domain.description}</div>
        ${domain.tools ? `<div class="domain-meta">${domain.tools.map(t => `<span class="meta-tag">${t}</span>`).join('')}</div>` : ''}
      </div>
      <div class="coming-soon">
        <div class="coming-soon-icon">🚧</div>
        <h2>Coming Soon</h2>
        <p>This domain is planned for a future update. The plays and practical guides will be added as Brisengroup's AI integration expands.</p>
      </div>`;
    return;
  }

  const plays = domain.plays[state.level] || [];
  const allPlaysCount = Object.values(domain.plays).reduce((sum, arr) => sum + arr.length, 0);

  let html = `
    <div class="domain-header">
      <div class="domain-title-row">
        <div class="domain-icon" style="background:${domain.colorBg}">${domain.icon}</div>
        <div class="domain-title">${domain.name}</div>
      </div>
      <div class="domain-description">${domain.description}</div>
      <div class="domain-meta">
        <span class="meta-tag"><span class="dot" style="background:${domain.color}"></span> ${domain.rhythm}</span>
        <span class="meta-tag">${allPlaysCount} plays total</span>
        ${domain.tools ? domain.tools.map(t => `<span class="meta-tag">${t}</span>`).join('') : ''}
      </div>
    </div>

    ${domain.id === 'tasks' ? `
    <div class="plays-section">
      <div class="plays-section-title">Current Tasks <span class="count">${CURRENT_TASKS.length}</span></div>
      <div class="tasks-list">
        ${CURRENT_TASKS.map(t => `
          <div class="task-row">
            <div class="task-num">#${t.num}</div>
            <div class="task-priority ${t.priority}">${t.priority}</div>
            <div class="task-content">
              <div class="task-title">${t.title}</div>
              <div class="task-meta">
                <span class="task-meta-item">Owner: ${t.owner}</span>
                <span class="task-meta-item">Due: ${t.due}</span>
                <span class="task-meta-item">Source: ${t.source}</span>
              </div>
            </div>
          </div>`).join('')}
        <div class="task-file-note">These tasks are synced from <code>TASKS.md</code> in your Dropbox. Ask Claude to update them anytime.</div>
      </div>
    </div>` : ''}

    <div class="plays-section">
      <div class="plays-section-title">
        ${state.level.charAt(0).toUpperCase() + state.level.slice(1)} Plays
        <span class="count">${plays.length}</span>
      </div>
      <div class="plays-grid">`;

  plays.forEach((play, i) => {
    const playId = `${domain.id}-${state.level}-${i}`;
    const isExpanded = state.expandedPlays[playId];
    html += `
      <div class="play-card ${isExpanded ? 'expanded' : ''}" onclick="togglePlay('${playId}')">
        <div class="play-card-header">
          <span class="play-card-num">Play ${i + 1}</span>
          <span class="play-card-level ${state.level}">${state.level}</span>
        </div>
        <div class="play-card-title">${play.title}</div>
        <div class="play-card-desc">${play.desc}</div>
        ${play.steps ? `
          <div class="play-detail">
            <div class="plays-section-title" style="margin-bottom:12px">Steps</div>
            ${play.steps.map((s, j) => `
              <div class="play-step">
                <div class="play-step-num">${j + 1}</div>
                <div class="play-step-text">${s}</div>
              </div>`).join('')}
            ${play.prompt ? `
              <div class="plays-section-title" style="margin-top:20px;margin-bottom:8px">Example Prompt</div>
              <div class="prompt-box" onclick="event.stopPropagation()">
                <button class="copy-btn" onclick="copyPrompt(this, this.parentElement.dataset.prompt)">Copy</button>
                ${escapeHtml(play.prompt)}
              </div>` : ''}
            ${play.tip ? `
              <div class="play-tip"><strong>Tip:</strong> ${play.tip}</div>` : ''}
          </div>` : ''}
      </div>`;
  });

  html += `</div></div>`;
  main.innerHTML = html;

  // Set data-prompt attributes
  main.querySelectorAll('.prompt-box').forEach(box => {
    const text = box.textContent.replace('Copy', '').trim();
    box.dataset.prompt = text;
  });
}

function renderOverview(main) {
  const activeDomains = DOMAINS.filter(d => d.id !== 'overview' && d.id !== 'memory' && !d.comingSoon);
  const comingSoonDomains = DOMAINS.filter(d => d.comingSoon);

  let totalPlays = 0;
  activeDomains.forEach(d => {
    if (d.plays) {
      const plays = d.plays[state.level] || [];
      totalPlays += plays.length;
    }
  });

  let html = `
    <div class="domain-header">
      <div class="domain-title-row">
        <div class="domain-icon" style="background:var(--accent-bg)">📊</div>
        <div class="domain-title">AI Playbook Overview</div>
      </div>
      <div class="domain-description">
        Your command center for integrating AI into daily business operations.
        ${activeDomains.length} active domains with ${totalPlays} plays at ${state.level} level.
        ${comingSoonDomains.length} more domains coming soon.
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Active Domains <span class="count">${activeDomains.length}</span></div>
      <div class="overview-grid">
        ${activeDomains.map(d => {
          const playCount = d.plays ? (d.plays[state.level] || []).length : 0;
          return `
            <div class="overview-card" onclick="setDomain('${d.id}')" style="border-top: 3px solid ${d.color}">
              <div class="overview-card-icon">${d.icon}</div>
              <div class="overview-card-title">${d.name}</div>
              <div class="overview-card-stat">${playCount} plays at ${state.level} level</div>
              <div class="overview-card-rhythm" style="background:${d.colorBg};color:${d.color}">${d.rhythm}</div>
            </div>`;
        }).join('')}
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Coming Soon <span class="count">${comingSoonDomains.length}</span></div>
      <div class="overview-grid">
        ${comingSoonDomains.map(d => `
          <div class="overview-card" style="opacity:0.5;cursor:default;border-top: 3px solid ${d.color}">
            <div class="overview-card-icon">${d.icon}</div>
            <div class="overview-card-title">${d.name}</div>
            <div class="overview-card-stat">Planned</div>
            <div class="overview-card-rhythm" style="background:${d.colorBg};color:${d.color}">${d.rhythm}</div>
          </div>`).join('')}
      </div>
    </div>`;

  main.innerHTML = html;
}

function renderMemory(main) {
  const f = FOUNDATION;
  let html = `
    <div class="domain-header">
      <div class="domain-title-row">
        <div class="domain-icon" style="background:var(--accent-bg)">${f.icon}</div>
        <div class="domain-title">${f.name} <span style="font-size:14px;color:var(--text-muted);font-weight:400;margin-left:8px">${f.subtitle}</span></div>

    <div class="plays-section">
      <div class="plays-section-title">Architecture</div>
      <div class="memory-arch">

          <div class="memory-layer">

            ${i < f.flow.length - 1 ? '<div class="memory-flow-arrow">→</div>' : ''}
          </div>`).join('')}
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Philosophy</div>
      <div class="play-card expanded" style="cursor:default">
        <div class="play-card-desc" style="font-size:13px;line-height:1.7">${f.philosophy}</div>
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Three Persistence Layers</div>
      <div class="overview-grid">
        <div class="overview-card" style="border-top: 3px solid var(--accent);cursor:default">
          <div class="overview-card-icon">🧠</div>
          <div class="overview-card-title">Memory</div>
          <div class="overview-card-stat">"What do I know?"</div>
          <div class="overview-card-rhythm" style="background:var(--accent-bg);color:var(--accent)">CLAUDE.md + memory/</div>

          <div class="overview-card-title">Shortcuts</div>
          <div class="overview-card-stat">"What runs automatically?"</div>
          <div class="overview-card-rhythm" style="background:var(--amber-bg);color:var(--amber)">Coming Soon</div>
        </div>
      </div>
    </div>`;

  main.innerHTML = html;
}

function renderControlPanel(main) {
  const cp = CONTROL_PANEL;
  const activeCount = cp.commands.filter(c => c.status === 'active').length;
  const comingCount = cp.commands.filter(c => c.status === 'coming').length;

  let html = `
    <div class="domain-header">
      <div class="domain-title-row">
        <div class="domain-icon" style="background:var(--amber-bg)">${cp.icon}</div>
        <div class="domain-title">${cp.name} <span style="font-size:14px;color:var(--text-muted);font-weight:400;margin-left:8px">${cp.subtitle} · Manasikāra</span></div>
      </div>
      <div class="domain-description">${cp.description}</div>
    </div>

    <div class="sense-doors-summary">
      <div class="sense-summary-pill"><span class="sense-summary-num" style="color:var(--green)">${activeCount}</span> Active Commands</div>
      <div class="sense-summary-pill"><span class="sense-summary-num" style="color:var(--text-muted)">${comingCount}</span> Coming Soon</div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Active Commands <span class="count">${activeCount}</span></div>
      <div class="command-grid">
        ${cp.commands.filter(c => c.status === 'active').map(cmd => `
          <div class="command-card">
            <div class="command-card-header">
              <div class="command-card-name"><span>${cmd.icon}</span> ${cmd.name}</div>
              <div class="command-card-status active">\u25cf Active</div>
            </div>
            <div class="command-card-desc">${cmd.desc}</div>
            <div class="command-card-prompt">
              <code>${cmd.prompt}</code>
              <button class="command-copy-btn" onclick="event.stopPropagation();copyPrompt(this,'${cmd.prompt.replace(/'/g, "\\'")}')">Copy</button>
            </div>
            <div class="command-card-meta">
              <div class="command-meta-tag">\u23f0 ${cmd.when}</div>
            </div>
            <div class="command-card-meta">
              <div class="command-meta-tag">\ud83d\udd04 Also: ${cmd.aliases}</div>
            </div>
            <div class="command-card-meta">
              <div class="command-meta-tag">\u2638\ufe0f ${cmd.phase}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Coming Soon <span class="count">${comingCount}</span></div>
      <div class="command-grid">
        ${cp.commands.filter(c => c.status === 'coming').map(cmd => `
          <div class="command-card" style="opacity:0.6">
            <div class="command-card-header">
              <div class="command-card-name"><span>${cmd.icon}</span> ${cmd.name}</div>
              <div class="command-card-status coming">Coming Soon</div>
            </div>
            <div class="command-card-desc">${cmd.desc}</div>
            <div class="command-card-prompt" style="opacity:0.5">
              <code>${cmd.prompt}</code>
            </div>
            <div class="command-card-meta">
              <div class="command-meta-tag">\u23f0 ${cmd.when}</div>
            </div>
            <div class="command-card-meta">
              <div class="command-meta-tag">\u2638\ufe0f ${cmd.phase}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Philosophy</div>
      <div class="play-card expanded" style="cursor:default">
        <div class="play-card-desc" style="font-size:13px;line-height:1.7">In Abhidhamma, <em>manasik\u0101ra</em> (attention) is one of the seven universal mental factors \u2014 it arises in every moment of consciousness. Without manasik\u0101ra, the mind cannot direct itself toward any object. The Control Panel serves this function: it provides the prompts that direct your AI system\u2019s attention toward specific tasks. Just as manasik\u0101ra turns the mind toward its object, each command here turns the system toward a specific operation.</div>
      </div>
    </div>`;

  main.innerHTML = html;
}

function renderSenseDoors(main) {
  const s = SENSE_DOORS;
  const mcpCount = s.sources.filter(x => x.type === 'MCP Connector').length;
  const localCount = s.sources.filter(x => x.status === 'local').length;
  const plannedCount = s.sources.filter(x => x.status === 'planned').length;

  let html = `
    <div class="domain-header">
      <div class="domain-title-row">
        <div class="domain-icon" style="background:var(--cyan-bg)">${s.icon}</div>
        <div class="domain-title">${s.name} <span style="font-size:14px;color:var(--text-muted);font-weight:400;margin-left:8px">${s.subtitle} · Dvāra</span></div>
      </div>
      <div class="domain-description">${s.description}</div>
    </div>

    <div class="sense-doors-summary">
      <div class="sense-summary-pill"><span class="sense-summary-num" style="color:var(--green)">${mcpCount}</span> MCP Connectors</div>
      <div class="sense-summary-pill"><span class="sense-summary-num" style="color:var(--cyan)">${localCount}</span> Local Channels</div>
      <div class="sense-summary-pill"><span class="sense-summary-num" style="color:var(--text-muted)">${plannedCount}</span> Planned</div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Connected Sources <span class="count">${mcpCount + localCount}</span></div>
      <div class="sense-doors-grid">
        ${s.sources.filter(x => x.status !== 'planned').map(src => `
          <div class="source-card">
            <div class="source-card-header">
              <div class="source-card-icon" style="background:${src.status === 'connected' ? 'var(--green-bg)' : 'var(--cyan-bg)'}">${src.icon}</div>
              <div class="source-card-info">
                <div class="source-card-name">${src.name}</div>
                <div class="source-card-type">${src.type}</div>
              </div>
              <div class="source-card-status ${src.status}">${src.status === 'connected' ? '● Connected' : '● Local'}</div>
            </div>
            <div class="source-card-desc">${src.desc}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Planned <span class="count">${plannedCount}</span></div>
      <div class="sense-doors-grid">
        ${s.sources.filter(x => x.status === 'planned').map(src => `
          <div class="source-card" style="opacity:0.6">
            <div class="source-card-header">
              <div class="source-card-icon" style="background:rgba(107,113,134,0.1)">${src.icon}</div>
              <div class="source-card-info">
                <div class="source-card-name">${src.name}</div>
                <div class="source-card-type">${src.type}</div>
              </div>
              <div class="source-card-status planned">Planned</div>
            </div>
            <div class="source-card-desc">${src.desc}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="plays-section">
      <div class="plays-section-title">Philosophy</div>
      <div class="play-card expanded" style="cursor:default">
        <div class="play-card-desc" style="font-size:13px;line-height:1.7">In Abhidhamma, the <em>dvāra</em> (doors) are the channels through which consciousness makes contact with objects. The eye-door receives visual forms, the ear-door receives sounds, the mind-door receives mental objects. Without sense doors, there is no cognition — only dormant bhavanga. Each MCP connector you activate opens a new dvāra, expanding what your AI can perceive and act upon.</div>
      </div>
    </div>`;

  main.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
renderAll();
</script>
</body>
</html>
