<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheAilogy — Baker Onboarding</title>
<style>
  :root{
    --bg:#ffffff; --canvas:#fbfbfc; --panel:#ffffff;
    --ink:#0b0d12; --ink-2:#383d47; --muted:#5b616e;
    --line:#e9eaed; --line-2:#f1f2f4; --hover:#f6f7f9;
    --accent:#1d4ed8; --accent-weak:#eef2fe;
    --black:#0b0d12;
    --t-11:11px; --t-12:12px; --t-13:13px; --t-14:14px; --t-15:15px; --t-19:19px; --t-24:24px; --t-32:32px; --t-40:40px;
    --lh-tight:1.15; --lh:1.55;
    --s1:8px; --s2:16px; --s3:24px; --s4:32px; --s5:48px;
    --r:10px; --r-sm:8px;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--ink);
       line-height:var(--lh);font-size:var(--t-15);letter-spacing:-0.005em;}
  svg{display:block}
  .app{display:grid;grid-template-columns:252px 1fr;min-height:100vh;}

  .sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;
           position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{padding:22px 20px 14px;display:flex;align-items:center;gap:11px;}
  .brand .mark{width:30px;height:30px;border-radius:7px;background:var(--ink);color:#fff;
               display:grid;place-items:center;font-weight:650;font-size:15px;letter-spacing:-0.03em;}
  .brand .name{font-weight:600;font-size:var(--t-15);letter-spacing:-0.02em;}
  .brand .name span{color:var(--accent);}
  .brand .sub{font-size:var(--t-11);color:var(--muted);margin-top:1px;font-family:var(--mono);letter-spacing:0;}
  .search{margin:4px 16px 8px;position:relative;}
  .search input{width:100%;padding:8px 10px 8px 31px;border:1px solid var(--line);border-radius:var(--r-sm);
                font-size:var(--t-13);background:var(--canvas);font-family:inherit;color:var(--ink);letter-spacing:0;}
  .search input::placeholder{color:var(--muted);}
  .search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak);}
  .search .mag{position:absolute;left:9px;top:8px;color:var(--muted);width:15px;height:15px;}
  .navlabel{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);
            padding:14px 20px 6px;font-weight:600;font-family:var(--mono);}
  .navitem{display:flex;align-items:center;gap:11px;padding:7px 16px 7px 17px;margin:1px 8px;border-radius:var(--r-sm);
           cursor:pointer;font-size:var(--t-14);color:var(--ink-2);position:relative;letter-spacing:-0.01em;}
  .navitem:hover{background:var(--hover);color:var(--ink);}
  .navitem .ic{width:18px;height:18px;color:var(--muted);flex:none;}
  .navitem .ic svg{width:18px;height:18px;stroke-width:1.7;}
  .navitem:hover .ic{color:var(--ink-2);}
  .navitem.active{background:var(--accent-weak);color:var(--accent);font-weight:550;}
  .navitem.active .ic{color:var(--accent);}
  .navitem.active::before{content:"";position:absolute;left:-8px;top:6px;bottom:6px;width:2.5px;border-radius:2px;background:var(--accent);}
  .navitem .badge{margin-left:auto;font-size:10px;background:var(--line-2);color:var(--muted);
                  padding:1px 6px;border-radius:6px;font-family:var(--mono);}
  .sb-spacer{flex:1;min-height:var(--s2);}
  .director-block{margin:8px;padding-top:8px;border-top:1px solid var(--line);}
  .sb-foot{padding:10px 20px 18px;font-size:var(--t-11);color:var(--muted);display:flex;align-items:center;gap:7px;font-family:var(--mono);}
  .dot{width:6px;height:6px;border-radius:50%;background:#16a34a;box-shadow:0 0 0 3px #16a34a22;}

  .main{padding:40px 44px 72px;max-width:1040px;}
  .kicker{font-size:var(--t-11);color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.14em;font-family:var(--mono);}
  h1.sec{font-size:var(--t-32);line-height:var(--lh-tight);margin:0 0 8px;letter-spacing:-0.03em;font-weight:650;}
  .sec-sub{color:var(--muted);font-size:var(--t-15);margin-bottom:var(--s4);max-width:62ch;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 15px;
        cursor:pointer;transition:border-color .14s ease,transform .14s ease;}
  .card:hover{border-color:var(--ink);transform:translateY(-1px);}
  .card .cic{width:20px;height:20px;color:var(--ink-2);margin-bottom:11px;}
  .card .cic svg{width:20px;height:20px;stroke-width:1.6;}
  .card:hover .cic{color:var(--accent);}
  .card .ct{font-weight:600;font-size:var(--t-14);margin-bottom:4px;line-height:1.3;letter-spacing:-0.01em;}
  .card .cb{font-size:var(--t-13);color:var(--muted);line-height:1.45;}
  .card .open{margin-top:13px;font-size:var(--t-12);color:var(--accent);font-weight:550;font-family:var(--mono);letter-spacing:0;opacity:0;transition:opacity .14s;}
  .card:hover .open{opacity:1;}

  .hero{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#fff,var(--canvas));
        padding:46px 40px 40px;margin-bottom:var(--s4);position:relative;overflow:hidden;}
  .hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--line) 1px,transparent 1px);
        background-size:22px 22px;opacity:.5;mask-image:linear-gradient(120deg,transparent 55%,#000);}
  .hero-in{position:relative;}
  .hero .kick{font-family:var(--mono);font-size:var(--t-11);letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
  .hero h1{margin:0 0 12px;font-size:var(--t-40);line-height:1.08;letter-spacing:-0.035em;font-weight:680;max-width:16ch;}
  .hero p{margin:0 0 26px;color:var(--ink-2);font-size:var(--t-19);max-width:54ch;letter-spacing:-0.01em;line-height:1.5;}
  .ctas{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--r-sm);font-size:var(--t-14);
       font-weight:550;cursor:pointer;border:1px solid transparent;font-family:inherit;text-decoration:none;letter-spacing:-0.01em;transition:.14s;}
  .btn .ic{width:15px;height:15px;}.btn .ic svg{width:15px;height:15px;stroke-width:1.8;}
  .btn.primary{background:var(--black);color:#fff;}
  .btn.primary:hover{background:#23262e;}
  .btn.ghost{background:#fff;color:var(--ink);border-color:var(--line);}
  .btn.ghost:hover{border-color:var(--ink);}

  .subhead{font-size:var(--t-12);color:var(--muted);margin:0 0 14px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);}
  .checklist{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:6px 20px;margin-top:var(--s3);}
  .ck{display:flex;align-items:center;gap:12px;padding:12px 0;font-size:var(--t-14);border-bottom:1px solid var(--line-2);}
  .ck:last-child{border-bottom:none;}
  .ck input{width:16px;height:16px;accent-color:var(--accent);}
  .ck .n{font-family:var(--mono);font-size:var(--t-12);color:var(--muted);width:18px;}
  .ck.done label{text-decoration:line-through;color:var(--muted);}

  dialog{border:none;border-radius:14px;padding:0;max-width:620px;width:92%;box-shadow:0 20px 60px rgba(11,13,18,.22);}
  dialog::backdrop{background:rgba(11,13,18,.38);backdrop-filter:saturate(120%) blur(2px);}
  .dlg-head{padding:20px 24px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px;}
  .dlg-head .cic{width:22px;height:22px;color:var(--ink);}.dlg-head .cic svg{width:22px;height:22px;stroke-width:1.6;}
  .dlg-head h2{margin:0;font-size:var(--t-19);letter-spacing:-0.02em;font-weight:620;}
  .dlg-head .x{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);width:22px;height:22px;padding:0;}
  .dlg-head .x:hover{color:var(--ink);}
  .dlg-body{padding:20px 24px 26px;font-size:var(--t-14);max-height:68vh;overflow-y:auto;line-height:1.55;}
  .dlg-body .kicker{margin-bottom:12px;}
  .dlg-body p{margin:0 0 14px;color:var(--ink-2);}
  /* plain-English gloss under a technical title — deliberately a different font (italic serif) */
  .plain-gloss{font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:15px;
               line-height:1.55;color:var(--ink-2);margin:0 0 16px;padding:11px 14px;
               background:var(--canvas);border-left:2px solid var(--accent);border-radius:var(--r-sm);}
  .dlg-h{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;margin:18px 0 9px;font-family:var(--mono);}
  .say{background:var(--canvas);border:1px solid var(--line);border-left:2px solid var(--accent);border-radius:var(--r-sm);
       padding:9px 13px;margin:7px 0;font-size:var(--t-13);font-family:var(--mono);color:var(--ink);letter-spacing:0;line-height:1.5;}
  .dlg-list{margin:0;padding-left:2px;list-style:none;}
  .dlg-list li{margin:8px 0;padding-left:20px;position:relative;color:var(--ink-2);}
  .dlg-list li::before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:1px;background:var(--accent);}
  .lnk{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:550;font-size:var(--t-13);text-decoration:none;margin:3px 14px 3px 0;}
  .lnk:hover{text-decoration:underline;}
  .lnk.baker{color:#a16207;}            /* amber — internal Baker resources (vs blue educational) */
  .lnk-col{display:flex;flex-direction:column;align-items:flex-start;gap:5px;margin-bottom:4px;}
  .pill{display:inline-flex;align-items:center;gap:5px;background:var(--line-2);color:var(--muted);font-size:var(--t-11);font-weight:600;
        padding:3px 9px;border-radius:6px;margin:0 6px 8px 0;font-family:var(--mono);letter-spacing:.02em;}
  .pill.ok{background:#e7f6ec;color:#15803d;}
  .pill.plan{background:var(--accent-weak);color:var(--accent);}

  .hide{display:none!important;}

  /* accessible-button resets — nav items + cards are real <button>s */
  button.navitem{font:inherit;border:none;background:none;width:calc(100% - 16px);text-align:left;}
  button.navitem:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
  button.card{font:inherit;text-align:left;width:100%;color:inherit;}
  button.card:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-color:var(--ink);}
  .search input:focus-visible{outline:none;}

  /* mobile top bar + off-canvas sidebar drawer */
  .topbar{display:none;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);
          position:sticky;top:0;background:var(--bg);z-index:30;}
  .topbar .mb{background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);width:38px;height:38px;
              display:grid;place-items:center;cursor:pointer;color:var(--ink);padding:0;}
  .topbar .mb:hover{border-color:var(--ink);}
  .topbar .mb svg{width:19px;height:19px;}
  .topbar .tb-name{font-weight:600;font-size:var(--t-15);letter-spacing:-0.02em;}
  .topbar .tb-name span{color:var(--accent);}
  .scrim{display:none;position:fixed;inset:0;background:rgba(11,13,18,.38);z-index:39;}
  @media(max-width:780px){
    .app{grid-template-columns:1fr}
    .topbar{display:flex}
    .sidebar{position:fixed;left:0;top:0;height:100vh;width:266px;z-index:40;
             transform:translateX(-100%);transition:transform .2s ease;box-shadow:0 0 44px rgba(11,13,18,.2);}
    .sidebar.open{transform:none}
    .scrim.show{display:block}
    .main{padding:24px}
    .hero{padding:32px 24px}.hero h1{font-size:32px}
  }
</style>
</head>
<body>
<header class="topbar">
  <button class="mb" id="menuBtn" aria-label="Open navigation menu" aria-controls="sidebar" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>
  <div class="tb-name">The<span>Ailogy</span></div>
</header>
<div class="scrim" id="scrim"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">A</div>
      <div><div class="name">The<span>Ailogy</span></div><div class="sub">baker · onboarding</div></div>
    </div>
    <div class="search">
      <span class="mag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg></span>
      <input id="search" type="text" placeholder="Search…" aria-label="Search sections and cards" oninput="doSearch(this.value)">
    </div>
    <div class="navlabel">Learn &amp; use Baker</div>
    <div id="nav"></div>
    <div class="sb-spacer"></div>
    <div class="director-block">
      <div class="navlabel" style="padding:4px 12px 6px;">Control Room</div>
      <div id="navDir"></div>
    </div>
    <div class="sb-foot"><span class="dot"></span> Baker live</div>
  </aside>
  <main class="main" id="main"></main>
</div>

<dialog id="detail">
  <div class="dlg-head">
    <div class="cic" id="dlgIc"></div>
    <h2 id="dlgTitle">Title</h2>
    <button class="x" onclick="document.getElementById('detail').close()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="dlg-body">
    <div class="kicker">Detail</div>
    <div id="dlgBody"></div>
  </div>
</dialog>

<script>

  hash:'<line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/>',
  message:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  scan:'<path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/>',
  archive:'<polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/>',
  mic:'<rect x="9" y="1" width="6" height="13" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>',
  'trending-up':'<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
  'file-text':'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
  'user-search':'<circle cx="10" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 9-6"/><circle cx="17" cy="17" r="3"/><line x1="21.5" y1="21.5" x2="19.1" y2="19.1"/>',

function svgIcon(key){

}

const SECTIONS=[
  {id:'landing',name:'Home',icon:'compass',landing:true},

  {id:'beginner',name:'Beginner’s Guide',icon:'rocket',sub:'New to Baker? Start here — the essentials, one step at a time.',cards:[
    {t:'What is Baker?',ic:'help',b:'The system in one minute.',detail:{lead:'Sentinel senses; Baker reasons and acts. The CEO Cockpit is the dashboard you look at.',list:['Baker reads Gmail, WhatsApp, meetings, ClickUp and RSS automatically.','It extracts deadlines, drafts replies, and remembers decisions.','You query it in plain English — no dashboard navigation needed.','It works in the background as a monitor and an executor.'],links:[{label:'Open the CEO Cockpit',url:'https://baker-master.onrender.com'}]}},
    {t:'Connect Baker',ic:'plug',b:'Get it running where you work.',detail:{lead:'Baker reaches your tools through the MCP connection. In Claude Desktop and Cowork it is already live — no setup. In Claude Code, add the config snippet once.',list:['Cowork / Claude Desktop — the Baker MCP is already connected.','Once connected, the 14 Baker tables answer your questions live.','Read-only on the database — Baker reads and analyses, never writes or deletes.','Outbound emails are always drafted for your approval, never auto-sent.']}},
    {t:'Ask your first question',ic:'message',b:'Query in plain English.',detail:{lead:'Type a question; Baker answers from the live database in seconds. No menus, no navigation.',say:['What’s due this week?','Show me the MO Vienna deadline','List VIP contacts','What did Baker do in the last 24 hours?']}},
    {t:'Run a Scan',ic:'scan',b:'Sweep a matter.',detail:{lead:'Ask Baker to scan a matter and report its current position — it pulls transcripts, emails and the record into one briefing.',say:['Prepare a deep analysis of the [meeting] about [matter]. Include full summary, every commitment, decision and action item with owner, key quotes, and risks.']}},
    {t:'Store a decision',ic:'archive',b:'Make Baker remember.',detail:{lead:'When you reach a conclusion, tell Baker to store it. It persists across sessions — next time you ask about the matter, Baker already knows.',say:['Store this decision in Baker: [your conclusion]']}},
    {t:'Which agent do I ask?',ic:'map',b:'Pick the right one.',detail:{lead:'Each agent has a job and a phrase that calls it. The Agent Fleet section lists them all.',list:['Deal questions → Deal Analyst.','People & meeting prep → People Researcher.','Legal → Legal.','Construction claims → Claims Analysis.']}},
  ]},

  {id:'advanced',name:'Advanced',icon:'sliders',sub:'Power use — get more out of Baker once you’re comfortable.',cards:[
    {t:'The Baker + Cowork loop',ic:'refresh',b:'The 5-step strategy loop.',detail:{lead:'How a matter moves from a raw meeting to a stored, verified decision.',list:['Ask Baker to prepare a deep brief (Cockpit Scan).','Drill down for more detail in the same session.','Paste the output into Cowork; discuss timing, risk, negotiation.','Tell Cowork to store the decision in Baker.','Verify via Cockpit Scan — ask Baker to confirm the position.']}},
    {t:'Deep Scan & drill-down',ic:'scan',b:'Go deeper, quote directly.',detail:{lead:'After the first Scan, push Baker for primary evidence — exact quotes, numbers, who said what.',say:['Go deeper on the financial discussion. Quote directly.','Who committed to what, and by when?']}},
    {t:'Store + verify a position',ic:'archive',b:'Persist, then confirm.',detail:{lead:'Store the conclusion, then ask Baker to read it back so you know the record is right.',say:['Store this decision in Baker: [conclusion]','Confirm Baker’s current position on [matter].']}},
    {t:'Voice & multi-channel input',ic:'mic',b:'Everything flows into the brain.',detail:{lead:'Voice memos, mail and WhatsApp all flow into the second brain automatically. Baker can even reply as a WhatsApp voice note.',list:['Gmail — read, classified, deadlines extracted.','WhatsApp — threads pulled on demand.','Fireflies / Plaud — transcripts ingested + tagged by matter.']}},
    {t:'Prompt patterns',ic:'type',b:'Get the best results.',detail:{lead:'The framings that get sharper output — role, stakes, and an explicit job.',say:['Act as a skeptical senior investment analyst with 30 years in luxury hospitality. Find reasons NOT to do the deal.','You are a world-class strategy consultant delivering a $300k analysis of the [INDUSTRY] sector…']}},
    {t:'Harness V2',ic:'sliders',b:'Give goals, not structure.',detail:{lead:'Hand the AI Head a goal; it translates into owner, scope, gates and a definition of done. You stay strategic.',say:['Run this through Harness V2 and tell me owner, scope, gates, and DONE criteria.']}},
    {t:'The Cockpit',ic:'monitor',b:'Your live dashboard.',detail:{lead:'Where priorities, travel, critical items and meetings surface at a glance. Open it for the daily glance; use Ask Baker for investigative questions.',links:[{label:'Open the Cockpit',url:'https://baker-master.onrender.com'},{label:'Mobile view',url:'https://baker-master.onrender.com/mobile'}]}},
  ]},

  {id:'aiedu',name:'AI Education',icon:'graduation',sub:'Learn how an AI system is built — and the surprising ways to use it.',cards:[
    {t:'AI Architecture',ic:'layers',b:'The building blocks of an AI system.',plain:'The main parts an AI system is made of — the pieces that work together so it can think, act and remember.',detail:{lead:'Baker is built from five parts. Here is each one with its proper name, so the terms start to feel familiar.',list:['The model (the “brain”) — the AI that thinks, reads and writes. Baker uses Claude.','Tools (the “hands”) — connections that let it use your email, calendar, files and to-do list. The technical name is MCP.','Memory — what it remembers from one conversation to the next.','Orchestration — how several AI helpers (called agents) split one big job between them.','The harness — the rules, checks and structure that make a raw AI reliable. Think guardrails.'],links:[{label:'Baker architecture diagram (v6)',url:'https://vallen300-bit.github.io/brisen-dashboards/Baker_Architecture_v6.html',kind:'baker'},{label:'Watch: Intro to AI language models — Andrej Karpathy (1 hr)',url:'https://www.youtube.com/watch?v=zjkBMFhNj_g'},{label:'Read: Thinking like an AI — how the model works (Ethan Mollick)',url:'https://www.oneusefulthing.org/p/thinking-like-an-ai'},{label:'Read: Building effective agents — how AI agents are put together (Anthropic)',url:'https://www.anthropic.com/engineering/building-effective-agents'},{label:'Read: What MCP is — the tool connection, explained (modelcontextprotocol.io)',url:'https://modelcontextprotocol.io/introduction'}]}},
    {t:'Agent Engineering',ic:'cpu',b:'How each AI helper is designed.',plain:'How each AI helper is given a clear job, the right tools and rules — so it does that job well instead of guessing.',detail:{lead:'An agent is an AI given one defined role, with its own instructions, tools and memory. Designing them well is what separates a handy assistant from a system you can rely on.',list:['Each agent gets written instructions that fix its job.','Review steps (called gates) catch mistakes before they go out.','Agents hand work to each other over a shared channel (the bus).','Golden rule: use AI for judgement, not routine mechanical steps.'],links:[{label:'Read: Building agents with the Claude Agent SDK (Anthropic)',url:'https://claude.com/blog/building-agents-with-the-claude-agent-sdk'},{label:'Read: Writing effective tools for AI agents (Anthropic)',url:'https://www.anthropic.com/engineering/writing-tools-for-agents'},{label:'Read: Real AI agents and real work (Ethan Mollick)',url:'https://www.oneusefulthing.org/p/real-ai-agents-and-real-work'},{label:'Listen: What is an AI agent? (a16z podcast)',url:'https://a16z.com/podcast/what-is-an-ai-agent/'},{label:'Read: Equipping agents with Agent Skills (Anthropic)',url:'https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills'}]}},
    {t:'MCP',ic:'plug',b:'How Baker reaches your apps and data.',plain:'The connection that lets the AI actually use your apps and files — not just talk about them. MCP is short for Model Context Protocol.',detail:{lead:'Without this connection the AI can only chat. With it, Baker can reach into your Gmail, ClickUp, calendar and its own 14 information tables — and act.',list:['Without it, the AI can only talk.','With it, it can act — read mail, look things up, add tasks.','Already switched on in Cowork and Claude Desktop.','Read-only on the database — it reads and analyses; it cannot change or delete data.','Some matter detail is Director-only; any email is drafted for approval, never sent on its own.'],say:['Show me upcoming deadlines','What is Baker’s status?','List VIP contacts'],links:[{label:'Read: Introducing the Model Context Protocol (Anthropic)',url:'https://www.anthropic.com/news/model-context-protocol'},{label:'Read: Introducing the Model Context Protocol (Simon Willison)',url:'https://simonwillison.net/2024/Nov/25/model-context-protocol/'},{label:'Read: A deep dive into MCP and the future of AI tooling (a16z)',url:'https://a16z.com/a-deep-dive-into-mcp-and-the-future-of-ai-tooling/'},{label:'Read: Simon Willison MCP post collection',url:'https://simonwillison.net/tags/model-context-protocol/'}]}},
    {t:'The harness',ic:'sliders',b:'What makes a team of agents reliable.',plain:'Everything wrapped around the AI — instructions, tools, memory, checks and a way to coordinate — that turns a raw model into a dependable worker.',detail:{lead:'The harness is everything around the model that keeps a group of agents aligned and reliable.',list:['It covers six layers: instructions, tools, memory, context, checks, testing.','A seventh layer (Baker’s own) is the channel agents talk on — the bus.','New agents are set up to the same standard, not hand-built each time.','That is why the whole fleet behaves consistently.'],links:[{label:'Read: Effective context engineering for AI agents (Anthropic)',url:'https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents'},{label:'Read: Effective harnesses for long-running agents (Anthropic)',url:'https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents'},{label:'Read: Context engineering — the blueprint behind reliable AI agents (Kubiya)',url:'https://www.kubiya.ai/blog/context-engineering-ai-agents'},{label:'Read: The shape of the thing (Ethan Mollick)',url:'https://www.oneusefulthing.org/p/the-shape-of-the-thing'}]}},
    {t:'RAG & Ingestion',ic:'database',b:'How Baker reads and remembers your files.',plain:'How Baker answers from your own documents, not just what the AI learned in training. Files come in, get understood, and become searchable. "RAG" is the technical name.',detail:{lead:'Your documents flow in, Baker makes sense of them, and they become things you can ask about.',list:['Reads PDFs, scans, images and tables into text.','Sorts each one — invoice, contract, plan or letter.','Then enriches, decides, drafts and stores — a five-step flow.','Sources: Gmail, Fireflies, WhatsApp, ClickUp, news feeds.'],say:['Save a Word file to Dropbox Baker-Feed/ — Baker ingests it automatically.'],links:[{label:'Read: What is RAG? (AWS)',url:'https://aws.amazon.com/what-is/retrieval-augmented-generation/'},{label:'Read: What is RAG? (Google Cloud)',url:'https://cloud.google.com/use-cases/retrieval-augmented-generation'},{label:'Read: What is RAG? (Built In)',url:'https://builtin.com/articles/retrieval-augmented-generation-explained'},{label:'Watch: What is RAG? — Marina Danilevsky (IBM)',url:'https://mediacenter.ibm.com/media/What+is+Retrieval-Augmented+Generation+(RAG)/1_4huqwyq1'}]}},
    {t:'Project Rooms',ic:'folder-plus',b:'A focused workspace for one topic.',plain:'A dedicated space that points the AI at one matter, so it isn’t distracted by everything else — like giving one job its own desk.',detail:{lead:'A project room narrows the AI to a single topic, so its answers stay focused.',list:['Open a folder in Cowork to start a room.','The folder’s instructions point work to the right agent.','Keeps focus tight — faster, cheaper, sharper answers.'],links:[{label:'Read: What are projects? (Claude Help Center)',url:'https://support.claude.com/en/articles/9517075-what-are-projects'},{label:'Read: Collaborate with Claude on Projects (Anthropic)',url:'https://www.anthropic.com/news/projects'},{label:'Read: Create a notebook in NotebookLM (Google)',url:'https://support.google.com/notebooklm/answer/16206563?hl=en'},{label:'Read: I tested NotebookLM, Claude Projects and ChatGPT Projects (XDA)',url:'https://www.xda-developers.com/tested-notebooklm-claude-projects-and-chatgpt-projects-for-research/'},{label:'Watch: Getting started with projects in Claude.ai (Anthropic)',url:'https://www.youtube.com/watch?v=GJ5jTgcbRHA'}]}},
    {t:'Special Skills (~187)',ic:'zap',b:'Baker’s library of ready-made procedures.',plain:'Reusable recipes the AI can pull in when needed — each one a saved way of doing a specific task. There are about 187 today.',detail:{lead:'A skill is a saved procedure, written in plain text. The AI loads one only when your words match it — so nothing clutters the rest of the time.',list:['Covers research, strategy, design, writing and operations.','Loaded only when a trigger phrase matches — no clutter.','Shared across every agent from one central library.','Each saves the fleet from re-inventing the same task.'],say:['/laconic — switches any agent to the short, bottom-line-first reply style'],links:[{label:'Read: What are Skills? (Claude Help Center)',url:'https://support.claude.com/en/articles/12512176-what-are-skills'},{label:'Read: Agent Skills overview (Claude docs)',url:'https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview'},{label:'Read: anthropics/skills — public skill library (GitHub)',url:'https://github.com/anthropics/skills'},{label:'Watch: Introduction to Agent Skills (Anthropic Academy)',url:'https://anthropic.skilljar.com/introduction-to-agent-skills'}]}},
    {t:'Uses you haven’t thought of',ic:'bulb',b:'Less-obvious ways to put AI to work.',plain:'Ideas beyond the everyday — a few already tried at Brisen, to spark your own.',detail:{lead:'Beyond the obvious. A few ideas already explored for Brisen:',list:['Voice notes — Baker can reply as a WhatsApp voice message.','Interactive negotiation models you click through, as web pages.','Board-grade strategy decks from a single one-line request.','A deliberately sceptical analyst that argues against a deal to test it.'],links:[{label:'Read: 15 times to use AI, and 5 not to (Ethan Mollick)',url:'https://www.oneusefulthing.org/p/15-times-to-use-ai-and-5-not-to'},{label:'Read: How Anthropic teams use Claude Code (Anthropic)',url:'https://claude.com/blog/how-anthropic-teams-use-claude-code'},{label:'Read: Claude for creative work (Anthropic)',url:'https://www.anthropic.com/news/claude-for-creative-work'},{label:'Read: 101 real-world generative AI use cases (Google Cloud)',url:'https://cloud.google.com/transform/101-real-world-generative-ai-use-cases-from-industry-leaders'},{label:'Listen: Principles for using AI at work, with Ethan Mollick (Coaching for Leaders)',url:'https://coachingforleaders.com/podcast/principles-for-using-ai-ethan-mollick/'}]}},
  ]},

  {id:'glossary',name:'Glossary',icon:'book',sub:'“Speak Baker” — every term decoded. Continuously updated.',cards:[
    {t:'MCP',ic:'plug',b:'Model Context Protocol.',detail:{lead:'The standard that lets an agent call external tools and data — Gmail, ClickUp, the Baker database. Without it, the model can only talk; with it, it can act.'}},
    {t:'Agent',ic:'cpu',b:'An autonomous AI worker.',detail:{lead:'A scoped AI role with its own system prompt, tools and memory. Example: the Legal agent, the Deal Analyst, a matter desk.'}},
    {t:'Cortex',ic:'refresh',b:'Baker’s reasoning cycle.',detail:{lead:'The per-matter 6-phase loop: sense → load → reason → propose → act → archive. It is how Baker works a matter the way a department head would.'}},
    {t:'RAG',ic:'database',b:'Retrieval-augmented generation.',detail:{lead:'Answering from your documents, not just the model’s training. Baker retrieves the relevant passages, then writes the answer grounded in them.'}},
    {t:'Bus',ic:'link',b:'Agent-to-agent channel.',detail:{lead:'The message channel agents use to coordinate and hand off work. The AI Head posts a brief; a builder picks it up and reports back on the bus.'}},
    {t:'Harness',ic:'sliders',b:'Scaffolding around a model.',detail:{lead:'Everything that turns a raw model into a reliable worker: context, tools, memory, gates, coordination. "Harness V2" is the current standard.'}},
    {t:'Sentinel',ic:'radio',b:'The sensing layer.',detail:{lead:'The part of the system that senses signals — email, WhatsApp, meeting transcripts — and feeds them to Baker. Sentinel senses; Baker reasons + acts.'}},
    {t:'Skill',ic:'zap',b:'A reusable capability.',detail:{lead:'A markdown-defined procedure an agent loads on demand when a trigger phrase matches. ~187 installed today.'}},
    {t:'Brief',ic:'file-text',b:'A work order for a builder.',detail:{lead:'The spec an AI Head writes for a code agent: problem, constraints, acceptance criteria. The builder ships against it.'}},
    {t:'Gate',ic:'shield',b:'A quality checkpoint.',detail:{lead:'A review step before shipping — e.g. a Codex second opinion or a security review. Work doesn’t merge until the gate passes.'}},
    {t:'Laconic',ic:'type',b:'The tight reply register.',detail:{lead:'Brisen’s compact format: bottom line first, headers, numbered one-liners, a named next step. Type /laconic to switch any agent into it.'}},
  ]},

  {id:'fleet',name:'Agent Fleet',icon:'users',sub:'Who does what — and exactly what to say to call each one.',cards:[
    {t:'AI Heads (AH1 / AH2)',ic:'users',b:'The orchestrators.',detail:{lead:'The engineering leads. They dispatch work, review it, and merge it — they never write production code themselves, they orchestrate the builders. You give goals; they translate into owner, scope, gates and a definition of done.',say:['Ship this','Review this','Fix this','Start the next tranche']}},
    {t:'Researcher',ic:'search',b:'Multi-source research.',detail:{lead:'Fan-out research across web, X and Substack with cited, verified synthesis. Every citation is re-checked before the report is written.',say:['Pull everything on [topic] and build a cited briefing','Cross-reference [X] against [Y]']}},
    {t:'Deal Analyst',ic:'trending-up',b:'Investment-banker view of a deal.',detail:{lead:'Reviews deals like an investment banker / asset manager — valuation, economics, IRR, cap rate, evidence, financing logic.',say:['/deal analyst','Analyze this deal','Valuation / IRR / financials','Portfolio overview','Acquisition analysis']}},
    {t:'Investment Proposal Analyst',ic:'file-text',b:'Pitch decks & term sheets.',detail:{lead:'Reviews external investment proposals, pitch decks and term sheets; runs due diligence and compares deals.',say:['Analyze pitch deck','Review term sheet','Compare deals','Due diligence']}},
    {t:'People Researcher',ic:'user-search',b:'Dossiers & meeting prep.',detail:{lead:'Builds people dossiers: background, role, relationships and meeting prep.',say:['Who is [person]?','Prepare a profile','Relationship map','Meeting prep for [name]','Dossier on [person]']}},
    {t:'Research',ic:'book-open',b:'Deep search across Baker memory.',detail:{lead:'Deep search across Baker’s memory and sources. Good for timelines, evidence packs and matter background.',say:['Pull everything on [topic]','Build a timeline','Cross-reference this','What do we know about [topic]?']}},

function el(t,c,x){const e=document.createElement(t);if(c)e.className=c;if(x!=null)e.textContent=x;return e;}
function iconEl(cls,key){const d=el('div',cls);d.appendChild(svgIcon(key));return d;}
let current='landing';

function buildNav(){
  const nav=document.getElementById('nav');
  SECTIONS.forEach(s=>{
    const it=el('button','navitem'+(s.id===current?' active':''));it.id='nav-'+s.id;it.type='button';
    it.appendChild(iconEl('ic',s.icon));it.appendChild(el('div',null,s.name));
    if(s.id==='matters')it.appendChild(el('span','badge','16'));
    if(s.id==='workflows')it.appendChild(el('span','badge','11'));
    it.onclick=()=>show(s.id);nav.appendChild(it);
  });
  const nd=document.getElementById('navDir');
  const it=el('button','navitem'+(current==='overview'?' active':''));it.id='nav-overview';it.type='button';
  it.appendChild(iconEl('ic',DIRECTOR.icon));it.appendChild(el('div',null,DIRECTOR.name));
  it.onclick=()=>show('overview');nd.appendChild(it);
}
function setActiveNav(id){document.querySelectorAll('.navitem').forEach(n=>n.classList.remove('active'));const n=document.getElementById('nav-'+id);if(n)n.classList.add('active');}
function searchText(c){let s=c.t+' '+c.b+' ';if(c.detail){s+=(c.detail.lead||'')+' '+((c.detail.say||[]).join(' '))+' '+((c.detail.list||[]).join(' '));}return s.toLowerCase();}
function renderCards(sec){
  const wrap=el('div','cards');
  sec.cards.forEach(c=>{
    const card=el('button','card');card.type='button';card.dataset.text=searchText(c);
    card.setAttribute('aria-label',c.t+' — '+c.b);
    card.appendChild(iconEl('cic',c.ic));
    card.appendChild(el('div','ct',c.t));card.appendChild(el('div','cb',c.b));card.appendChild(el('div','open','Open →'));
    card.onclick=()=>openDetail(c);wrap.appendChild(card);
  });return wrap;
}
function show(id){
  current=id;setActiveNav(id);closeMenu();window.scrollTo(0,0);
  const main=document.getElementById('main');while(main.firstChild)main.removeChild(main.firstChild);
  document.getElementById('search').value='';
  if(id==='landing'){renderLanding(main);return;}
  const sec=(id==='overview')?DIRECTOR:SECTIONS.find(s=>s.id===id);
  main.appendChild(el('div','kicker','TheAilogy / '+sec.name));
  main.appendChild(el('h1','sec',sec.name));
  main.appendChild(el('div','sec-sub',sec.sub||''));
  main.appendChild(renderCards(sec));
}
function renderLanding(main){
  const hero=el('div','hero');const hin=el('div','hero-in');
  hin.appendChild(el('div','kick','Baker · Onboarding'));
  hin.appendChild(el('h1','','Put Baker to work.'));
  hin.appendChild(el('p','','Your guide to what Baker is, what it can do, and how to use it. Work through the sections, then launch Baker directly.'));
  const ctas=el('div','ctas');
  const b1=document.createElement('a');b1.className='btn primary';b1.href='https://baker-master.onrender.com';b1.target='_blank';
  b1.appendChild(el('span',null,'Open Baker Dashboard'));b1.appendChild(iconEl('ic','external'));
  const b2=document.createElement('a');b2.className='btn ghost';b2.href='#';b2.onclick=(e)=>{e.preventDefault();show('beginner');};
  b2.appendChild(el('span',null,'Start the Beginner’s Guide'));b2.appendChild(iconEl('ic','rocket'));
  ctas.appendChild(b1);ctas.appendChild(b2);hin.appendChild(ctas);hero.appendChild(hin);main.appendChild(hero);
  main.appendChild(el('div','subhead','New here? Start with these'));
  main.appendChild(renderCards({cards:[
    {t:'What is Baker?',ic:'help',b:'The 1-minute overview.',detail:{lead:'Sentinel senses; Baker reasons + acts. The CEO Cockpit is the dashboard you look at. Baker reads your inbox, meetings and WhatsApp, extracts deadlines, drafts replies, and remembers decisions.'}},
    {t:'Which agent do I ask?',ic:'map',b:'Pick the right agent.',detail:{lead:'See the Agent Fleet section — each agent lists exactly what to say to call it. Deal questions → Deal Analyst; people → People Researcher; legal → Legal; claims → Claims Analysis.'}},
    {t:'How Baker helps Brisen',ic:'trending-up',b:'Real workflows.',detail:{lead:'See Brisen AI Workflows for the 11 concrete ways Baker speeds Brisen up — from valuation to research to presentations.'}},
  ]}));
  const cl=el('div','checklist');
  const steps=['Connect Baker in Claude Desktop','Ask Baker your first question','Run a Scan on a matter','Store your first decision','Explore the Skills library'];
  const saved=loadChecklist();
  steps.forEach((s,i)=>{
    const row=el('div','ck');const cb=el('input');cb.type='checkbox';cb.id='ck-'+i;
    const n=el('span','n',String(i+1).padStart(2,'0'));const lab=el('label',null,s);lab.style.flex='1';lab.htmlFor='ck-'+i;
    cb.checked=!!saved[i];if(cb.checked)row.classList.add('done');
    cb.onchange=()=>{row.classList.toggle('done',cb.checked);saved[i]=cb.checked;saveChecklist(saved);};
    row.appendChild(cb);row.appendChild(n);row.appendChild(lab);cl.appendChild(row);
  });
  main.appendChild(el('div','subhead',''));main.appendChild(cl);
}
function openDetail(c){
  const ih=document.getElementById('dlgIc');while(ih.firstChild)ih.removeChild(ih.firstChild);ih.appendChild(svgIcon(c.ic));
  document.getElementById('dlgTitle').textContent=c.t;
  const b=document.getElementById('dlgBody');while(b.firstChild)b.removeChild(b.firstChild);
  const d=c.detail||{lead:c.b};
  if(c.plain)b.appendChild(el('p','plain-gloss',c.plain));
  if(d.pills){const pw=el('div');d.pills.forEach(p=>pw.appendChild(el('span','pill '+(p.cls||''),p.t)));b.appendChild(pw);}
  if(d.lead)b.appendChild(el('p',null,d.lead));
  if(d.list){b.appendChild(el('div','dlg-h','In short'));const ul=el('ul','dlg-list');d.list.forEach(li=>ul.appendChild(el('li',null,li)));b.appendChild(ul);}
  if(d.say){b.appendChild(el('div','dlg-h','Try saying'));d.say.forEach(s=>b.appendChild(el('div','say',s)));}
  if(d.links){
    const mk=(l)=>{const a=document.createElement('a');a.className='lnk'+(l.kind==='baker'?' baker':'');a.href=l.url;a.target='_blank';a.rel='noopener';a.appendChild(el('span',null,l.label));a.appendChild(iconEl('ic','external'));a.querySelector('.ic').style.width='13px';a.querySelector('.ic svg').style.width='13px';a.querySelector('.ic svg').style.height='13px';return a;};
    const bk=d.links.filter(l=>l.kind==='baker'), ed=d.links.filter(l=>l.kind!=='baker');
    if(bk.length){b.appendChild(el('div','dlg-h','On Baker'));const lw=el('div','lnk-col');bk.forEach(l=>lw.appendChild(mk(l)));b.appendChild(lw);}
    if(ed.length){b.appendChild(el('div','dlg-h',bk.length?'Learn more':'Links'));const lw=el('div','lnk-col');ed.forEach(l=>lw.appendChild(mk(l)));b.appendChild(lw);}
  }
  document.getElementById('detail').showModal();
}
function doSearch(q){
  q=q.trim().toLowerCase();
  if(current==='landing'&&q){show('beginner');document.getElementById('search').value=q;}
  document.querySelectorAll('.card').forEach(card=>{card.classList.toggle('hide',!(!q||(card.dataset.text||'').includes(q)));});
}
// mobile drawer
const sidebarEl=document.getElementById('sidebar'),scrimEl=document.getElementById('scrim'),menuBtn=document.getElementById('menuBtn');
function openMenu(){sidebarEl.classList.add('open');scrimEl.classList.add('show');menuBtn.setAttribute('aria-expanded','true');}
function closeMenu(){sidebarEl.classList.remove('open');scrimEl.classList.remove('show');menuBtn.setAttribute('aria-expanded','false');}
menuBtn.onclick=()=>sidebarEl.classList.contains('open')?closeMenu():openMenu();
scrimEl.onclick=closeMenu;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMenu();});

// checklist persistence
function loadChecklist(){try{return JSON.parse(localStorage.getItem('theailogy.checklist')||'{}');}catch(e){return {};}}
function saveChecklist(o){try{localStorage.setItem('theailogy.checklist',JSON.stringify(o));}catch(e){}}

buildNav();show('landing');
</script>
